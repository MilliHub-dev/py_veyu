<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Message from {{ sender_name }}</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            background-color: #f8f9fa;
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid #28a745;
        }
        .content {
            padding: 20px 0;
        }
        .message-box {
            background-color: #f9f9f9;
            border-left: 4px solid #28a745;
            padding: 15px;
            margin: 15px 0;
            font-style: italic;
        }
        .footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            font-size: 12px;
            color: #777;
            text-align: center;
        }
        .button {
            display: inline-block;
            padding: 10px 20px;
            background-color: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>New Message</h2>
    </div>
    
    <div class="content">
        <p>Hello {{ recipient_name }},</p>
        
        <p>You have received a new message from <strong>{{ sender_name }}</strong> regarding <strong>{{ context_info }}</strong>.</p>
        
        <div class="message-box">
            "{{ message_preview }}"
        </div>
        
        <p style="text-align: center;">
            <a href="{{ chat_url }}" class="button">Reply to Message</a>
        </p>
    </div>
    
    <div class="footer">
        <p>&copy; {% now "Y" %} Veyu. All rights reserved.</p>
        <p>Please do not reply to this email directly.</p>
    </div>
</body>
</html>
