<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ subject }}</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            background-color: #f8f9fa;
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid #007bff;
        }
        .content {
            padding: 20px 0;
        }
        .footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            font-size: 12px;
            color: #777;
            text-align: center;
        }
        .button {
            display: inline-block;
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>Veyu Notification</h2>
    </div>
    
    <div class="content">
        <p>Hello {{ user_name }},</p>
        
        <p>{{ message }}</p>
        
        {% if cta_text and cta_link %}
        <p style="text-align: center;">
            <a href="{{ cta_link }}" class="button">{{ cta_text }}</a>
        </p>
        {% endif %}
    </div>
    
    <div class="footer">
        <p>&copy; {% now "Y" %} Veyu. All rights reserved.</p>
        <p>You received this email because you are a registered user on Veyu.</p>
    </div>
</body>
</html>
